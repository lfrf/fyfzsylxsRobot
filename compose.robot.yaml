services:
  edge-backend:
    image: python:3.11-slim-bookworm
    working_dir: /app
    volumes:
      - ./local/edge-backend:/app
      - ./shared:/shared
      - ./logs:/workspace-logs
      - a22_logs:/logs
      - a22_data:/data
    command: >-
      bash -lc "pip install --no-cache-dir -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      CLOUD_API_BASE: ${CLOUD_API_BASE:-http://host.docker.internal:19000}
      CLOUD_WS_CHAT_ENDPOINT: ${CLOUD_WS_CHAT_ENDPOINT:-ws://host.docker.internal:19000/ws/chat}
      REMOTE_TRANSPORT: auto
      LOG_DIR: /workspace-logs/edge-backend
      DATA_DIR: /data
      AUDIO_PIPELINE_ROLE: remote_forward_only
    networks:
      - a22-net

  robot-runtime:
    image: python:3.11-slim-bookworm
    working_dir: /app
    volumes:
      - ./local/robot-runtime:/app
      - ./shared:/shared:ro
      - ./logs:/workspace-logs
      - a22_logs:/logs
      - a22_data:/data
    command: >-
      bash -lc "pip install --no-cache-dir -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port 18100"
    ports:
      - "18100:18100"
    environment:
      EDGE_BACKEND_BASE: http://edge-backend:8000
      LOG_DIR: /workspace-logs/robot-runtime
      ROBOT_EYES_MODE: ${ROBOT_EYES_MODE:-mock}
      ROBOT_SERVO_MODE: ${ROBOT_SERVO_MODE:-mock}
      ROBOT_AUDIO_MODE: ${ROBOT_AUDIO_MODE:-mock}
      ROBOT_SERVO_PAN_CHANNEL: ${ROBOT_SERVO_PAN_CHANNEL:-0}
      ROBOT_SERVO_TILT_CHANNEL: ${ROBOT_SERVO_TILT_CHANNEL:-1}
      ROBOT_SERVO_MIN_DEGREE: ${ROBOT_SERVO_MIN_DEGREE:-70}
      ROBOT_SERVO_MAX_DEGREE: ${ROBOT_SERVO_MAX_DEGREE:-110}
      ROBOT_CHAT_TIMEOUT_SECONDS: ${ROBOT_CHAT_TIMEOUT_SECONDS:-20}
    depends_on:
      - edge-backend
    networks:
      - a22-net
